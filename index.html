<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanctuaire - Gestionnaire de Builds</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --d4-red: #8b0000;
            --d4-dark: #111111;
            --d4-grey: #2a2a2a;
            --text-light: #e0e0e0;
        }
        body {
            background-color: var(--d4-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.2);
        }
        h1 { color: var(--d4-red); text-align: center; text-transform: uppercase; letter-spacing: 2px;}
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            background-color: var(--d4-grey);
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }
        button {
            padding: 12px 24px;
            background-color: var(--d4-red);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background-color: #a00000; }
        .variant-tags { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .tag {
            background-color: #444;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.9em;
            color: #ffcc00;
        }
        .gear-list { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        
        /* Petit ajustement pour que ça passe sur une seule colonne sur téléphone */
        @media (max-width: 600px) {
            .gear-list { grid-template-columns: 1fr; }
        }
        .gear-item {
            background-color: var(--d4-grey);
            padding: 15px;
            border-left: 4px solid var(--d4-red);
            border-radius: 4px;
        }
        .success-msg { color: #4CAF50; margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Forge de Build</h1>
        
        <div id="auth-section" style="text-align: right; margin-bottom: 20px;">
            <button id="loginBtn" style="background-color: #4285F4;">Connexion avec Google</button>
            <span id="userInfo" style="display: none; margin-left: 10px; color: #4CAF50; font-weight: bold;"></span>
        </div>

        <div class="input-group">
            <input type="text" id="newBuildName" placeholder="Nom du nouveau build...">
            <button id="createBuildBtn">Créer le Build</button>
        </div>

        <div id="buildEditor" style="display: none; margin-top: 20px; border: 1px solid #333; padding: 20px; border-radius: 8px; background-color: #151515;">
            <h2>Forge : <span id="displayBuildName" style="color: #ffcc00;"></span></h2>
            
            <div class="input-group">
                <input type="text" id="newVariantName" placeholder="Nom de la variante (ex: Early Game)">
                <button id="addVariantBtn">Ajouter Variante</button>
            </div>
            <div class="variant-tags" id="variantEditorTags"></div>

            <div id="variantContent" style="display: none; margin-top: 20px;">
                <div style="margin-bottom: 20px;">
                    <input type="text" id="aspectSearch" placeholder="Rechercher un aspect par nom..." style="width: 100%; box-sizing: border-box; padding: 12px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 4px;">
                    <div id="aspectSearchResults" style="background: #222; border: 1px solid #444; max-height: 200px; overflow-y: auto; border-top: none; border-radius: 0 0 4px 4px;"></div>
                </div>
                
                <div class="gear-list" id="gearSlotEditor"></div>
                
                <h3 style="color: var(--d4-red); margin-top: 30px; border-bottom: 1px solid #333; padding-bottom: 10px;">Talismans & Charme</h3>
                <div class="gear-list" id="talismanEditor"></div>
                <button id="saveBuildBtn" style="width: 100%; background-color: #2e7d32; margin-top: 20px; font-size: 1.1em;">Sauvegarder le Build dans Firebase</button>
            </div>
        </div>

        <div id="result">
            </div>

        <div style="margin-top: 40px; border-top: 1px solid #333; padding-top: 20px;">
            <h2 style="color: var(--d4-red);">Mes Builds Sauvegardés</h2>
            <div id="saved-builds-list" style="display: flex; flex-direction: column; gap: 10px;">
                Connectez-vous pour voir vos builds.
            </div>
        </div>
    </div>

    <script type="module" src="assets/app.js"></script>

</body>
</html>
